name: Generate pacman animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: generate pacman-dark
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          gameTheme: github-dark
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Save Dark version
        run: |
          mkdir -p dist
          mv dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg

      - name: generate pacman-light
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          gameTheme: github
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # This takes both files from 'dist' and drops them at the root of the 'output' branch
      - name: push both files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
