name: Generate pacman animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Step 1: Secure the repository files so we have a place to save the output
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up a clean Node environment where we control the RAM limits
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Generate the single, reliable base SVG
      - name: generate pacman-contribution-graph.svg
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          npm install -g pacman-contribution-graph
          pacman-contribution-graph --game pacman --platform github --gameTheme github --username ${{ github.repository_owner }} --output dist/pacman-contribution-graph.svg      
      
      # Step 4: Push the generated file to the output branch
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
