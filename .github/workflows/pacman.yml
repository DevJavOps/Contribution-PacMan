steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Generate the Dark Mode version
      - name: generate pacman-contribution-graph-dark.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Check the action's documentation; if it supports a 'theme' or 'color' 
          # parameter, you would add it here. 
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # 2. Rename the first file so it doesn't get overwritten
      - name: Rename to dark version
        run: |
          mkdir -p dist
          mv dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg

      # 3. Generate the Light Mode version
      - name: generate pacman-contribution-graph.svg (Light)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # 4. Push everything in 'dist' to the output branch
      - name: push both files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
